<style>
    body{
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background-color: #0f172a;
        text-align: center;
        font-family: sans-serif;
    }h1{
        color: #38bdf8;
        text-shadow: 0 0 10px #38bdf8;
         }h2{
        color: #ff007c;
                       text-shadow: 0 0 10px #ff007c;
                   }img{
        border-radius: 50%;
        border: 4px solid white;
        width:300px;
        height:300px;
        object-fit: cover;
        box-shadow: 0 0 30px #38bdf8;
                                       }a{
        text-decoration: none;}
        @keyframes LeftToRight{
            0% {transform: translateX(20px);}
            100%{transform: translateX(-20px);}
        }a h1{
                     animation: LeftToRight 1.5s ease-in-out infinite alternate;
        color:#00ff00;
        text-shadow: 0 0 20px #00ff00,0 0 40px #00ff00;
                 }.fake-alert{
background-color: #0d0f0f;
color: red;
        position: fixed;
        left: 50%;
        top:50%;
        border: 2px solid red;
        box-shadow: 0 0 25px #ff3333;
        padding:10px 20px;
        font-weight: bold;
        border-radius: 5px;
        transform: scale(0.1);

transition: all 0.5s;         }

/* Matrix rain canvas background */
#matrixCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

/* Typewriter effect */
#typewriter-container {
    margin: 12px 0;
    min-height: 36px;
}
#typewriter-text {
    display: inline;
    color: #ffd700;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700;
    border-right: 2px solid #ffd700;
    padding-right: 4px;
    animation: blink-cursor 0.7s step-end infinite;
}
@keyframes blink-cursor {
    50% { border-color: transparent; }
}
</style>
<canvas id="matrixCanvas"></canvas>
<h1>qazk_</h1>
<h2>bilibili</h2>
<div id="typewriter-container">
    <span id="typewriter-text"></span>
</div>
<img src="head.png" onclick="qazk_()">
<a href="https://www.bilibili.com">
    <h1>
    打开bilibili
    </h1>
</a>
<script>
    // === 黑客帝国代码雨效果 ===
    (function() {
        var canvas = document.getElementById('matrixCanvas');
        var ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        var chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
        var charArray = chars.split('');
        var fontSize = 14;
        var columns = Math.floor(canvas.width / fontSize);
        var drops = [];

        for (var i = 0; i < columns; i++) {
            drops[i] = Math.floor(Math.random() * -100);
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (var i = 0; i < drops.length; i++) {
                var char = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    })();

    // === 打字机效果 ===
    (function() {
        var sentences = ['qazk_', '欢迎来到我的个人网站', 'bilibili∽'];
        var index = 0;
        var charIndex = 0;
        var isDeleting = false;
        var el = document.getElementById('typewriter-text');
        var typeSpeed = 120;
        var deleteSpeed = 60;
        var pauseTime = 1000;

        function typeEffect() {
            var current = sentences[index];

            if (!isDeleting) {
                el.textContent = current.substring(0, charIndex + 1);
                charIndex++;
                if (charIndex === current.length) {
                    isDeleting = true;
                    setTimeout(typeEffect, pauseTime);
                    return;
                }
                setTimeout(typeEffect, typeSpeed);
            } else {
                el.textContent = current.substring(0, charIndex - 1);
                charIndex--;
                if (charIndex === 0) {
                    isDeleting = false;
                    index = (index + 1) % sentences.length;
                    setTimeout(typeEffect, 200);
                    return;
                }
                setTimeout(typeEffect, deleteSpeed);
            }
        }

        setTimeout(typeEffect, 500);
    })();

    function qazk_(){
        var n=100;
        for(var i=1;i<=n;i++){
            //alert("qazk_数到第"+i+"个");
            setTimeout(()=>{
                let box=document.createElement("div");
                box.innerText="打不开";
                document.body.appendChild(box);
                box.className="fake-alert";

                box.offsetHeight;

                box.style.left=(Math.random()*100)+"%";
                box.style.top=(Math.random()*100)+"%";
                box.style.opacity=1;
                box.style.transform=`scale(${Math.random()+0.5}) rotate(${Math.random()*60-30}deg)`;
            },i*100);

        }

    }
</script>
